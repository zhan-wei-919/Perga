<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Perga</title>
    <style>
      /* Reset:终端要占满浏览器,不留任何默认外边距。 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", "Fira Code", "Source Code Pro", Menlo, Consolas, monospace;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        background: #1e1e1e;
        color: #d4d4d4;
      }
      /* 光标闪烁:focused pane 才闪。steps(1) 让 opacity 离散切换,看起来
         像传统终端的硬切而不是淡入淡出。1.2s 周期(600ms on / 600ms off)
         比 wezterm 默认 800ms/phase 略快,与本项目 sub-second 反馈节奏匹配。 */
      @keyframes pg-cursor-blink {
        0%, 50% { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }
      .pg-pane-focused .pg-cursor-blink {
        animation: pg-cursor-blink 1.2s steps(1, end) infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
